name: Feature request
description: Suggest a new feature or enhancement.
title: "[feat] <short description>"
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Describing the **user problem**
        before the proposed solution helps us evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Tell us about the situation in your own words. "I want to ..."
        / "I find it hard to ..." / "Every time I ..." are good starts.
      placeholder: |
        Every time I create a new document I end up editing
        metadata.typ to set the title and the date. I would like that
        to happen automatically.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? CLI sketch welcome.
      placeholder: |
        `typst-manager new my-doc -t article --title "My Report"`
        substitutes {{ title }} with "My Report" and {{ date }} with
        today's date in metadata.typ.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you thought about, and why they are worse than
        the proposed solution.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Links to similar features in other tools, screenshots, or any
        other context that helps.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and BACKLOG.md to make sure this is not already tracked.
          required: true
        - label: This proposal preserves the "plain folders, no lock-in" promise of the project.
          required: true
